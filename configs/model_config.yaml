model:
  name: "codebert"
  base_model: "microsoft/codebert-base"
  num_labels: 6
  max_seq_length: 512
  hidden_dropout_prob: 0.1

training:
  epochs: 10
  batch_size: 16
  learning_rate: 2.0e-5
  warmup_steps: 500
  weight_decay: 0.01
  gradient_clip: 1.0
  seed: 42
  eval_steps: 200
  save_steps: 500
  early_stopping_patience: 3

labels:
  - "sql_injection"
  - "xss"
  - "buffer_overflow"
  - "hardcoded_secret"
  - "weak_crypto"
  - "broken_auth"

inference:
  threshold: 0.5
  batch_size: 8
  device: "cuda"   # set to "cpu" if no GPU
