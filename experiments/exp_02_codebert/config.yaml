experiment: exp_02_codebert
description: CodeBERT fine-tuned multi-label classifier
status: in_progress

model:
  base: microsoft/codebert-base
  num_labels: 6
  max_seq_length: 512
  dropout: 0.1

training:
  epochs: 10
  batch_size: 16
  learning_rate: 2.0e-5
  warmup_steps: 500
  weight_decay: 0.01
  early_stopping_patience: 3

results:
  notes: "Populate after training on real labeled data"
